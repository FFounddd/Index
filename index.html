<!DOCTYPE html>
<html>
<head>

<title>ORI ARCHIVE</title>

<style>

/* ---------- GLOBAL ---------- */

body{
margin:0;
background:#050505;
font-family:Consolas,monospace;
color:#e0e0e0;
overflow:hidden;
}

/* ---------- MAIN FRAME ---------- */

#frame{
display:grid;
grid-template-columns:260px 1fr;
grid-template-rows:60px 1fr;
height:100vh;
border:1px solid #440000;
}

/* ---------- HEADER ---------- */

#header{
grid-column:1/3;
background:#0b0000;
border-bottom:1px solid #660000;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
}

#title{
color:#ff2a2a;
letter-spacing:2px;
font-size:18px;
}

/* ---------- SIDEBAR ---------- */

#sidebar{
background:#080000;
border-right:1px solid #440000;
overflow-y:auto;
}

.sectionButton{
padding:12px;
cursor:pointer;
border-bottom:1px solid #220000;
color:#ff5555;
}

.sectionButton:hover{
background:#120000;
}

/* ---------- CONTENT AREA ---------- */

#content{
padding:20px;
overflow-y:auto;
position:relative;
}

/* ---------- FADE EFFECT ---------- */

.fadeOut{
opacity:0;
transition:opacity .4s;
}

.fadeIn{
opacity:1;
transition:opacity .4s;
}

/* ---------- FILE SYSTEM ---------- */

.file{
margin-bottom:10px;
border:1px solid #440000;
background:#0c0000;
}

.file summary{
padding:10px;
cursor:pointer;
color:#ff4444;
}

.fileContent{
padding:10px;
border-top:1px solid #330000;
line-height:1.5;
}

/* ---------- SUB FILES ---------- */

.subfile{
margin-left:15px;
border:1px solid #330000;
margin-top:5px;
}

.subfile summary{
padding:8px;
color:#ff7777;
}

/* ---------- ISM GLITCH ---------- */

.glitch{
animation:glitch .25s infinite;
}

@keyframes glitch{

0%{text-shadow:2px 0 red}
25%{text-shadow:-2px 0 purple}
50%{text-shadow:2px 0 crimson}
75%{text-shadow:-2px 0 white}
100%{text-shadow:0 0 transparent}

}

</style>
</head>

<body>

<div id="frame">

<div id="header">

<div id="title">ORI ARCHIVE :: WORLD INDEX</div>

</div>


<!-- ---------- SIDEBAR ---------- -->

<div id="sidebar">

<div class="sectionButton" onclick="loadSection('characters')">
CHARACTERS
</div>

<div class="sectionButton" onclick="loadSection('locations')">
LOCATIONS
</div>

<div class="sectionButton" onclick="loadSection('factions')">
FACTIONS
</div>

<div class="sectionButton" onclick="loadSection('events')">
HISTORICAL EVENTS
</div>

<div class="sectionButton" onclick="loadSection('logs')">
ARCHIVED LOGS
</div>

</div>


<!-- ---------- CONTENT ---------- -->

<div id="content">

<h2>ORI SYSTEM ONLINE</h2>

<p>
Archive database operational.  
Select a category to begin.
</p>

<p class="glitch">
ISM: try not to break anything :)
</p>

</div>

</div>

<script>

/* ---------- SECTION DATABASE ---------- */

const sections = {

characters:`

<h2>CHARACTERS</h2>

<details class="file">
<summary>Found</summary>

<div class="fileContent">

Creator of the crystalline systems and current vessel of the Amethyst Knight Suit.

<details class="subfile">
<summary>Incident: Mournland Event</summary>
<div class="fileContent">
Found survived the initial blast but was later placed into full containment by House Glasswright.
</div>
</details>

<details class="subfile">
<summary>Psychological Profile</summary>
<div class="fileContent">
Severe emotional trauma linked to the loss of Medea.
</div>
</details>

</div>
</details>


<details class="file">
<summary>Medea</summary>

<div class="fileContent">
Former assistant to Found.  
Her life force was used to stabilize the AKS system.
</div>

</details>


<details class="file">
<summary>ISM</summary>

<div class="fileContent">

Internal Systems Monitor created to assist Found.

<p class="glitch">
STATUS: unstable :)
</p>

</div>

</details>

`,

locations:`

<h2>LOCATIONS</h2>

<details class="file">
<summary>The Mournland</summary>

<div class="fileContent">

Epicenter of the crystalline blast that reshaped the region.

</div>

</details>

<details class="file">
<summary>Sharn</summary>

<div class="fileContent">

Former metropolis now partially corrupted by crystalline infection.

</div>

</details>

`,

factions:`

<h2>FACTIONS</h2>

<details class="file">
<summary>House Glasswright</summary>

<div class="fileContent">

Industrial house responsible for the development of the AKS system.

</div>

</details>

<details class="file">
<summary>Family of Glass</summary>

<div class="fileContent">

Followers of Nyxis who embrace crystalline corruption.

</div>

</details>

`,

events:`

<h2>EVENTS</h2>

<details class="file">
<summary>The Mournland Event</summary>

<div class="fileContent">

A catastrophic crystal explosion triggered during containment failure.

</div>

</details>

`,

logs:`

<h2>ARCHIVED LOGS</h2>

<details class="file">
<summary>Recovered Facility Transmission</summary>

<div class="fileContent">

Audio log recovered from the Glasswright facility during the incident.

</div>

</details>

`

};

/* ---------- LOAD SECTION WITH FADE ---------- */

function loadSection(section){

let content = document.getElementById("content");

content.classList.add("fadeOut");

setTimeout(()=>{

content.innerHTML = sections[section];

content.classList.remove("fadeOut");

content.classList.add("fadeIn");

},300);

}

</script>

</body>
</html>
