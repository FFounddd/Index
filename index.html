<!DOCTYPE html>
<html>
<head>

<title>ORI ARCHIVE</title>

<style>

/* ---------- GLOBAL ---------- */

body{
margin:0;
background:#050505;
font-family:Consolas,monospace;
color:#e0e0e0;
overflow:hidden;
}

/* ---------- MAIN FRAME ---------- */

#frame{
display:grid;
grid-template-columns:260px 1fr;
grid-template-rows:60px 1fr;
height:100vh;
border:1px solid #440000;
}

/* ---------- HEADER ---------- */

#header{
grid-column:1/3;
background:#0b0000;
border-bottom:1px solid #660000;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
}

#title{
color:#ff2a2a;
letter-spacing:2px;
font-size:18px;
}

/* ---------- SIDEBAR ---------- */

#sidebar{
background:#080000;
border-right:1px solid #440000;
overflow-y:auto;
}

.sectionButton{
padding:12px;
cursor:pointer;
border-bottom:1px solid #220000;
color:#ff5555;
}

.sectionButton:hover{
background:#120000;
}

/* ---------- CONTENT AREA ---------- */

#content{
padding:20px;
overflow-y:auto;
position:relative;
}

/* ---------- FADE EFFECT ---------- */

.fadeOut{
opacity:0;
transition:opacity .4s;
}

.fadeIn{
opacity:1;
transition:opacity .4s;
}

/* ---------- FILE SYSTEM ---------- */

.file{
margin-bottom:10px;
border:1px solid #440000;
background:#0c0000;
}

.file summary{
padding:10px;
cursor:pointer;
color:#ff4444;
}

.fileContent{
padding:10px;
border-top:1px solid #330000;
line-height:1.5;
}

/* ---------- SUB FILES ---------- */

.subfile{
margin-left:15px;
border:1px solid #330000;
margin-top:5px;
}

.subfile summary{
padding:8px;
color:#ff7777;
}

/* ---------- ISM GLITCH ---------- */

.glitch{
animation:glitch .25s infinite;
}

@keyframes glitch{

0%{text-shadow:2px 0 red}
25%{text-shadow:-2px 0 purple}
50%{text-shadow:2px 0 crimson}
75%{text-shadow:-2px 0 white}
100%{text-shadow:0 0 transparent}

}

</style>
</head>

<body>

<div id="frame">

<div id="header">

<div id="title">ORI ARCHIVE :: WORLD INDEX</div>

</div>


<!-- ---------- SIDEBAR ---------- -->

<div id="sidebar">

</div>

<div class="sectionButton" onclick="loadSection('logs')">

<!-- ---------- CONTENT ---------- -->
